name: 'Dependency Review'

# Block PRs that introduce dependencies with a moderate-or-higher
# severity advisory. This repository is public, so we can use
# `actions/dependency-review-action` (free without GHAS, includes
# license checks). Private repos in the same organisation fall back to
# `osv-scanner-action` because dependency-review requires GHAS there.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  # The action posts a summary comment on failure.
  pull-requests: write

jobs:
  dependency-review:
    name: 'Dependency Review'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: moderate
