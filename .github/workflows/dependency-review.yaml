name: 'Dependency Review'

# Block PRs that introduce dependencies with a moderate-or-higher severity advisory. This repository is public,
# so `actions/dependency-review-action` is available without GitHub Advanced Security and it adds license-policy
# checks on top of the vulnerability scan.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  # The action posts a summary comment on failure.
  pull-requests: write

jobs:
  dependency-review:
    name: 'Dependency Review'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        # Endpoints below were baselined from the audit-mode log observed across recent successful runs.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.securityscorecards.dev:443
            github.com:443
            *.actions.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: moderate
