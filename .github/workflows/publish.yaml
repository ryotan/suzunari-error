name: '🎉 Publish 🚀'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  crates-io:
    name: crates.io
    runs-on: ubuntu-latest
    environment: crates.io
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache-workspaces: . -> target

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Dry run — suzunari-error-macro-impl
        run: cargo publish --dry-run -p suzunari-error-macro-impl

      - name: Publish suzunari-error-macro-impl
        run: cargo publish -p suzunari-error-macro-impl
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for macro-impl to be indexed on crates.io
        run: sleep 30

      - name: Dry run — suzunari-error
        run: cargo publish --dry-run -p suzunari-error

      - name: Publish suzunari-error
        run: cargo publish -p suzunari-error
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
