name: '🎉 Publish 🚀'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  crates-io:
    name: crates.io
    runs-on: ubuntu-latest
    environment: crates.io
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
        with:
          cache-workspaces: . -> target

      - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth

      - name: Dry run — suzunari-error-macro-impl
        run: cargo publish --dry-run -p suzunari-error-macro-impl

      - name: Publish suzunari-error-macro-impl
        run: cargo publish -p suzunari-error-macro-impl
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for macro-impl to be indexed on crates.io
        run: sleep 30

      - name: Dry run — suzunari-error
        run: cargo publish --dry-run -p suzunari-error

      - name: Publish suzunari-error
        run: cargo publish -p suzunari-error
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
