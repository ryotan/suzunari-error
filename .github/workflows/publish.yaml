name: '🎉 Publish 🚀'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Default-deny token permissions; the publish job below grants the extra scope it needs (id-token: write for
# crates.io OIDC).
permissions:
  contents: read

jobs:
  crates-io:
    name: crates.io
    runs-on: ubuntu-latest
    environment: crates.io
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        # Monitor and (in audit mode) report unexpected egress and process activity on the runner during
        # publish. Switch `egress-policy` to `block` after baselining (expected: crates.io, GitHub OIDC).
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: step-security/setup-rust-toolchain@a8823c6cdb5668ac7528d7756acfee772bf71809 # v1.16.1
        with:
          cache-workspaces: . -> target

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Dry run — suzunari-error-macro-impl
        run: cargo publish --dry-run -p suzunari-error-macro-impl

      - name: Publish suzunari-error-macro-impl
        run: cargo publish -p suzunari-error-macro-impl
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for macro-impl to be indexed on crates.io
        run: sleep 30

      - name: Dry run — suzunari-error
        run: cargo publish --dry-run -p suzunari-error

      - name: Publish suzunari-error
        run: cargo publish -p suzunari-error
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
