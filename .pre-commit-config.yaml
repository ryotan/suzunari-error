# .idea/ is IDE-managed (regenerated by JetBrains tooling); .config/mise/mise.lock is machine-generated by
# mise itself. Neither should be rewritten by generic text hooks.
exclude: '^(\.idea/|\.config/mise/mise\.lock$)'

repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.1
  hooks:
  - id: gitleaks
# prek's Rust-native builtin implementations — no external Python dependency.
# https://prek.j178.dev/builtin/
- repo: builtin
  hooks:
  - id: end-of-file-fixer
  - id: trailing-whitespace
    # Preserve Markdown hard line breaks (two trailing spaces); trims anything beyond that.
    args: [--markdown-linebreak-ext=md]
  - id: check-added-large-files
  - id: check-merge-conflict
  - id: check-symlinks
  - id: destroyed-symlinks
  - id: check-shebang-scripts-are-executable
    # Rust's `#![...]` inner-attribute syntax (e.g. `#![no_std]`) is indistinguishable from a shebang by this
    # hook's "starts with #!" heuristic — same false positive the upstream Python hook has. No .sh/.bash files
    # are tracked in this repo today, so this only guards against future ones.
    exclude: '\.rs$'
  - id: fix-byte-order-marker
  - id: mixed-line-ending
